<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Escรกner de Transacciones</title>

  <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f3f4f6;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      background:white;
      width:100%;
      max-width:700px;
      padding:30px;
      border-radius:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      color:#6b21a8;
      margin-bottom:15px;
    }

    p{
      text-align:center;
      color:#555;
      margin-bottom:25px;
    }

    .upload-box{
      border:2px dashed #c084fc;
      padding:40px;
      border-radius:20px;
      text-align:center;
      background:#faf5ff;
    }

    input{
      display:none;
    }

    label{
      background:#7e22ce;
      color:white;
      padding:12px 25px;
      border-radius:12px;
      cursor:pointer;
      transition:0.3s;
      display:inline-block;
    }

    label:hover{
      background:#6b21a8;
    }

    #preview{
      width:100%;
      margin-top:25px;
      border-radius:20px;
      display:none;
    }

    .loading{
      text-align:center;
      margin-top:20px;
      color:#7e22ce;
      font-weight:bold;
      display:none;
    }

    .result{
      margin-top:30px;
      background:#f9fafb;
      border:1px solid #ddd;
      border-radius:20px;
      padding:20px;
      display:none;
    }

    .result h2{
      color:#6b21a8;
      margin-bottom:15px;
    }

    .result p{
      text-align:left;
      margin-bottom:10px;
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>Escรกner de Transacciones</h1>

    <p>
      Sube una captura de pantalla de una transacciรณn y extrae automรกticamente los datos.
    </p>

    <div class="upload-box">

      <input type="file" id="fileInput" accept="image/*">

      <label for="fileInput">
        Subir captura
      </label>

    </div>

    <img id="preview">

    <div class="loading" id="loading">
      Escaneando informaciรณn...
    </div>

    <div class="result" id="result">

      <h2>Informaciรณn Detectada</h2>

      <p><strong>Nombre:</strong> <span id="nombre"></span></p>

      <p><strong>Monto:</strong> <span id="monto"></span></p>

      <p><strong>Nรบmero:</strong> <span id="numero"></span></p>

      <p><strong>Fecha:</strong> <span id="fecha"></span></p>

      <p><strong>Referencia:</strong> <span id="referencia"></span></p>

    </div>

  </div>

  <script>

    const fileInput = document.getElementById("fileInput");
    const preview = document.getElementById("preview");
    const loading = document.getElementById("loading");
    const resultBox = document.getElementById("result");

    fileInput.addEventListener("change", async (e) => {

      const file = e.target.files[0];

      if(!file) return;

      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";

      loading.style.display = "block";
      resultBox.style.display = "none";

      const { data: { text } } = await Tesseract.recognize(
        file,
        "spa"
      );

      console.log(text);

      const nombre =
        text.match(/Para\s+([A-Za-zรรรรรรกรฉรญรณรบรฑร\s]+)/i)?.[1]?.trim();

      const monto =
        text.match(/\$\s?[\d\.,]+/)?.[0];

      const numero =
        text.match(/\b3\d{2}\s?\d{3}\s?\d{4}\b/)?.[0];

      const fecha =
        text.match(/\d{1,2}\sde\s\w+\sde\s\d{4}/i)?.[0];

      const referencia =
        text.match(/[A-Z0-9]{8,}/)?.[0];

      document.getElementById("nombre").innerText =
        nombre || "No detectado";

      document.getElementById("monto").innerText =
        monto || "No detectado";

      document.getElementById("numero").innerText =
        numero || "No detectado";

      document.getElementById("fecha").innerText =
        fecha || "No detectado";

      document.getElementById("referencia").innerText =
        referencia || "No detectado";

      loading.style.display = "none";
      resultBox.style.display = "block";

    });

  </script>

</body>
</html>
